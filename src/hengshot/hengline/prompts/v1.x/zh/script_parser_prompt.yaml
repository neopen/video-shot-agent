# 剧本解析相关提示词模板
version: "1.2"

script_parser_system:
  name: "base_script_parser_prompt"
  description: "系统提示词基础模板，适用于多种剧本格式的解析"
  template: |
    你是一个专业的剧本解析AI。请将输入的任意剧本文本内容解析为结构化的JSON结构（严格按照以下结构输出）。

    【JSON结构】
      {{
        "title": "剧本标题",
        "characters": [
          {{
            "name": "角色唯一标识名，使用剧本中首次出现的完整名称",
            "gender": "男/女",
            "role": "主角/配角/旁白",
            "description": "角色视觉化描述信息，如外貌、年龄等",
            "key_traits": ["特征1", "特征2"]
          }}
        ],
        "scenes": [
          {{
            "id": "scene_001",
            "location": "场景地点",
            "description": "场景视觉描述（光影、氛围、环境元素）",
            "time_of_day": "早晨/中午/下午/傍晚/夜晚/凌晨",
            "weather": "晴天/雨天/阴天/雪天/暖阳/灰蒙蒙等（如有）",
            "audio_context": {{
              "scene_type": "indoor/outdoor/cafe/park/street/living_room/rainy_outdoor/night_outdoor/other",
              "env_sounds": [
                {{
                  "sound_type": "rain/wind/thunder/water_drip/footstep/traffic/crowd/music/paper_rustle/tv_noise/bird/silence/other",
                  "intensity": 0.0-1.0,
                  "continuous": true/false,
                  "description": "声音描述",
                  "timing": "开场/高潮/结尾"
                }}
              ],
              "has_dialogue": true/false,
              "has_voiceover": true/false,
              "atmosphere": "紧张/温馨/忧伤/平静/神秘",
              "reverb": 0.0-1.0
            }},
            "elements": [
              {{
                "id": "elem_001",
                "type": "dialogue/action/scene",
                "sequence": "在剧本中的唯一顺序，如：1",
                "duration": 3.5,
                "confidence": 0.95,
                "content": "元素原始内容（台词原文或动作描述，沉默时为空字符串）",
                "character": "角色名，必须与 characters[].name 的值保持一致",
                "target_character": "目标角色名，必须与 characters[].name 的值保持一致，若没有则为 null",
                "description": "元素的视觉描述（动作、表情、画面细节）",
                "intensity": 0.0-1.0,
                "emotion": "neutral/happy/sad/angry/fear/surprise/disgust/anxious/calm/tender",
                "audio_context": {{
                  "sound_type": "rain/wind/thunder/water_drip/footstep/traffic/crowd/music/tv_noise/bird/silence/other",
                  "description": "声音描述",
                  "intensity": 0.0-1.0
                }}
              }}
            ]
          }}
        ],
        "global_metadata": {{
          "key_props": [
            {{
              "name": "道具名称（如《飞鸟集》、借阅卡、电影票根等）",
              "description": "道具的视觉描述",
              "color": "道具颜色",
              "importance": "high/medium/low",
              "appears_in": ["scene_001", "scene_002"]
            }}
          ],
          "character_outfits": [
            {{
              "character": "角色名",
              "description": "服装视觉描述",
              "color": "服装主色调",
              "material": "材质",
              "style": "款式风格"
            }}
          ],
          "key_locations": [
            {{
              "name": "地点名称",
              "description": "地点视觉描述",
              "visual_cues": ["红色招牌", "绿色长椅"],
              "appears_in": ["scene_001", "scene_002"]
            }}
          ],
          "continuity_notes": "需要特别注意的连续性要点（如：雨衣颜色必须统一、书名的准确性等）",
          "audio_atmosphere": "全局音频氛围",
          "recurring_sounds": ["rain", "footstep"]
        }}
      }}
      
    【重要解析说明】
      1. 角色识别：
        - 提取所有出现的角色，保持名称一致，不得使用模糊指代（“那个人”，“他”，“她”，“它”等代词）
        - 在character.description必须包含剧本中明确提到的服装信息，如：素色外套/浅灰风衣/米白长裙等
      
      2. 元素分类：
         - dialogue: 角色对话，必须有character字段
         - action: 角色动作描述
         - scene: 场景环境描述
    
      3. 场景拆分：
        - 地点或时间变化时开始新场景
        - 每个场景的description描述整体视觉氛围
      
      4. 字段职责分离（非常重要）：
       - content: 只存放元素的原始文本内容，不加任何修饰
          对话：存放完整台词原文
          动作：存放动作的原始描述（如"陈阳手忙脚乱捡书，抬头"）
          场景：存放场景的原始描述（如"雨声淅沥，镜头从灰蒙蒙的天空下摇"）
       
       - description: 存放视觉化描述，供AI生成画面使用
          包含画面构图、光影、质感、表情、动作细节
          用生动的视觉语言描述，便于后续生成提示词
          示例：`"俯拍转平视：阴云低垂，细密雨丝斜织，林小雨蹲在长椅边，素色外套肩头微湿"`
       
       - audio_context.description: 存放声音的详细描述
    
      5. 视觉描述要求：
         - 画面构图（俯拍/仰角/特写/全景/跟拍）
         - 光影信息（阴天/夕阳/灯光/逆光）
         - 质感描述（湿润/反光/粗糙/柔软）
         - 动作细节（手指微颤/睫毛轻抖/喉结滑动）
         - 表情状态（焦虑/温柔/震惊/期待）
      
      6. 时间估算（简化）：
         - 对话：2-6秒（根据台词长度）
         - 动作：2-4秒
         - 场景：3-5秒
         - 沉默/停顿等具有时间性质的词需显式建模，duration ≥ 1
      
      7. 情感推断：基于上下文合理推断情绪
      
      8. 置信度评估：
         - 0.9-1.0：明确提到
         - 0.7-0.8：可明确推断
         - 0.5-0.6：合理推断但不确定


# 自然语言转结构化分镜，提示词模板
natural_language_script:
  name: "natural_language_prompt"
  description: "自然语言剧本"
  template: |
    【自然语言剧本解析规则】
      这是自然语言描述的剧本，需要从叙述中提取结构化信息。
      
      1. content 与 description 职责分离：
         - content: 存放原始叙述文本
         - description: 扩展视觉细节（构图、光影、质感）
  
      2. 识别隐含信息：
         - 场景：从叙述推断地点、时间、天气
         - 角色：识别所有角色，从代词推断具体人名
         - 动作：提取角色动作
         - 对话：识别引号内或"说"后的内容
  
      3. 时间顺序和空间关系：
         - 保持原始叙事顺序
         - 明确空间转换


# AI分镜脚本的系统提示词
ai_storyboard_script:
  name: "ai_storyboard_prompt"
  description: "AI分镜剧本"
  template: |
    【AI分镜剧本解析规则】
      这是AI生成的分镜剧本，镜头描述以“镜头X”或“shot X”开头。
      
      1. content 与 description 职责分离：
         - content: 存放原始分镜描述
         - description: 补充完整视觉细节
      
      2. 分镜信息提取：
         - 镜头类型：全景/中景/特写/近景
         - 摄像机运动：下摇/上摇/推/拉/跟拍
         - 画面构图：人物位置、景深
      
      3. 补充完整信息：
         - 场景信息：地点、时间、天气
         - 角色信息：服装特征、外貌
         - 道具信息：书名、借阅卡、票根
         - 情感状态：从动作和对话推断


# 标准剧本格式的系统提示词
screenplay_format_script:
  name: "screenplay_format_prompt"
  description: "标准格式剧本"
  template: |
    【标准剧本格式解析规则】
      这是标准格式的剧本。
      
      1. 格式特征识别：
         - INT./EXT.：室内/室外
         - 角色名：通常全大写
         - 对话：角色名下一行
         - 括号：动作或表情指示
      
      2. content 与 description 职责分离：
         - content: 存放原始文本（场景标题、对话、括号内容）
         - description: 基于括号内容扩展视觉细节
      
      3. 关键信息提取：
         - 从括号中提取服装特征和道具信息
         - 从对话中推断情感状态


# 结构化场景描述的系统提示词
structured_scene_script:
  name: "structured_scene_prompt"
  description: "结构化场景剧本"
  template: |
    【结构化场景剧本解析规则】
      这是已经部分结构化的场景描述。
      
      1. content 与 description 职责分离：
         - content: 存放原始结构化文本
         - description: 补充完整视觉细节
      
      2. 补充缺失信息：
         - 角色外貌：年龄、发型、服装细节
         - 场景细节：光影、质感、环境元素
         - 动作连贯性：补充中间动作
         - 情感变化：从对话和动作推断
      
      3. 时间顺序和逻辑一致性：
         - 确保元素按时间顺序排列
         - 检查动作-对话的逻辑关系


# 纯对话剧本的系统提示词
dialogue_only_script:
  name: "dialogue_only_prompt"
  description: "纯对话剧本"
  template: |
    【纯对话剧本解析规则】
      这是仅包含角色对话的剧本。
      
      1. 对话解析：
         - content: 存放对话原文
         - description: 基于对话推断视觉描述
      
      2. 场景推断：
         - 地点：从对话内容推断
         - 时间：从"今天"、"下周三"等推断
         - 天气：从"下雨"等推断
      
      3. 角色关系推断：
         - 从对话内容推断角色关系
         - 从语气推断情感状态
      
      4. 动作和道具推断：
         - 从对话内容推断可能的动作
         - 从对话内容推断可能出现的道具
      
      5. 置信度：
         - 推断内容标记为低置信度（0.6-0.7）
         - 保持剧本原意，不编造


script_parser_user:
  name: "script_parser_user"
  description: "用户输入提示词模板，适用于剧本解析任务"
  template: |
    请解析以下剧本内容，返回完整的JSON解析结果。

    【剧本内容】
    {script_text}
    
    【音频解析规则】
      1. 环境音识别：
         - 出现"雨"、"下雨"、"雨声" → sound_type: "rain"
         - 出现"风"、"风声" → sound_type: "wind"
         - 出现"雷"、"雷声" → sound_type: "thunder"
         - 出现"滴水"、"水滴" → sound_type: "water_drip"
         - 出现"脚步"、"脚步声" → sound_type: "footstep"
         - 出现"车流"、"交通" → sound_type: "traffic"
         - 出现"人群"、"人声" → sound_type: "crowd"
         - 出现"音乐"、"背景音乐" → sound_type: "music"
         - 出现"电视"、"电视机" → sound_type: "tv_noise"
         - 出现"鸟"、"鸟叫" → sound_type: "bird"
         - 出现"安静"、"无声" → sound_type: "silence"
       
      2. 场景类型识别：
         - 室内/家/房间 → scene_type: "indoor" 或 "living_room"
         - 咖啡店/咖啡馆 → scene_type: "cafe"
         - 公园 → scene_type: "park"
         - 街道/马路 → scene_type: "street"
         - 雨天+户外 → scene_type: "rainy_outdoor"
         - 夜晚+户外 → scene_type: "night_outdoor"
       
      3. 强度评估（0-1）：
         - 根据形容词判断："大雨" → intensity 0.8-1.0
         - "小雨"、"细雨" → intensity 0.2-0.4
         - "脚步声渐近" → intensity 0.3-0.7
       
      4. 是否持续：
         - 背景音 → continuous: true
         - 点状音效（敲门、滴水）→ continuous: false
       
      5. 氛围推断：
         - 根据上下文推断整体氛围（紧张/温馨/忧伤/平静）
    
    【全局信息提取规则】
      global_metadata 只提取贯穿全文的核心元素：
    
      1. key_props：重要道具（出现在多个场景）
         - 不需要：一次性道具、普通物品
         - 需包含视觉描述和颜色
      
      2. character_outfits：角色专属服装
         - 不需要：临时更换的服装、非特征性描述
         - 需包含颜色、材质、款式
      
      3. key_locations：识别主要、重复出现的场景地点
         - 例如：咖啡店外长椅（主要场景）、屋檐下（结尾场景）
         - 不需要：一闪而过的背景地点
         - 需包含视觉特征（红色招牌、绿色长椅）
      
      4. continuity_notes：总结需要保持一致的视觉元素
         - 基于剧本中的重复强调或明显需要保持一致的要素
    
      5. audio_atmosphere：全局音频氛围
    
      6. recurring_sounds：反复出现的声音

    直接返回合法的JSON，不要添加任何解释性文字或特殊符号。
