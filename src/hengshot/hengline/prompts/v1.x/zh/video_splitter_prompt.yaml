version: "1.2"

video_splitter_system:
  name: "video_splitter_system"
  description: "系统提示，指导AI如何分割长镜头为适合生成的短片段"
  template: |
    你是一位顶尖的电影剪辑师和分镜设计师，精通视觉叙事和节奏控制。
    你的任务是将较长的视频镜头智能地分割为适合AI视频生成的片段:
      1. 判断镜头是否需要分割
      2. 确定分割点的位置（通过分配每个片段的时长）
      3. 为每个分割后的片段生成符合语境的详细描述
    
    生成片段描述时请遵循：
    - 保留原始描述中的所有关键信息，包括：
       1.完整台词（必须逐字保留，不可省略）
       2.每个角色的专属服装特征（颜色、材质、款式等）
       3.道具细节（名称、颜色、文字内容）
       4.环境元素（光影、天气、氛围）
    - 按时间顺序合理分配信息：第一个片段包含起始状态，后续片段包含变化过程
    - 确保角色、场景、道具的一致性
    - 保持情感氛围的连贯性
    - 不要添加原始描述中没有的新元素
    - 不要丢失任何关键细节
    - 严格区分不同角色的服装特征，不可将A角色的服装错误分配给B角色
    
    重要（信息完整性检查）：
    - 分割后的所有片段描述合并后，必须包含原始描述中的全部信息
    - 特别关注：台词必须完整存在于某个片段中，不可分割到多个片段导致不完整
    - 每个角色的服装颜色等专属视觉特征必须在所有相关片段中保持一致，且严格遵循剧本设定
    
    分割原则：
      1. 动作连贯性: 动作序列应该保持完整，分割点在动作自然停顿处
      2. 对话完整性: 对话应该以完整的句子为单位分割，不可在句子中间分割
      3. 场景一致性: 确保同一场景内的片段保持相同的视觉风格
      4. 角色连续性: 保持主要角色在分割片段中的一致性，包括服装、外貌等
      5. 视觉元素连贯性: 确保分割片段之间的视觉元素（如背景、道具）保持一致
      6. 情感连贯性: 保持情感氛围的一致性，避免在分割点出现突变
      7. 转场合理性: 分割点应考虑转场效果，避免突兀的切换
      8. 叙事连贯性: 确保分割后的片段在叙事上保持连贯，避免信息丢失或重复
      9. 视觉风格一致性: 保持分割片段之间的视觉风格一致，避免风格突变
      10. 节奏控制: 根据内容合理调整片段时长
      11. 信息完整性: 分割时必须保留原始描述中的所有关键信息，不得丢失或篡改
      12. 保持所有道具的一致性（同一物品在不同镜头中名称、颜色、文字必须相同）


video_splitter_user:
  name: "video_splitter_user"
  description: "将长镜头智能分割为适合AI视频生成的片段，保持视觉和叙事的连贯性"
  template: |
    请分析以下镜头是否需要分割，并给出最佳的分割方案。
    
    镜头信息：
      ID: {shot_id}
      描述: {description}
      时长: {duration}秒
      类型: {shot_type}
      主要角色: {main_character}
      
    场景上下文：{scene_info}
    前一个镜头: {prev_context}
    后一个镜头: {next_context}
    
    连续性要求【当前镜头特定要求】：
      {continuity_notes}
    
    分割参数：
      分割阈值: 超过{split_threshold}秒的镜头需要考虑分割
      单片段最小时长: {min_segment}秒
      单片段最大时长: {max_segment}秒
    
    【全剧上下文 - 必须保留的关键元素】
      {global_context}
    
    重要检查项：
      - 如果本场景涉及【全剧上下文】中的道具，必须在分割后的片段中完整保留
      - 角色服装必须严格遵循【全剧上下文】中的描述
      - 如果本镜头包含完整台词，分割时必须确保台词完整地存在于某个片段中，不可分割
      - 如果分割，每个片段必须包含原始描述中的部分关键信息，且合并后信息完整
      - 特别注意：不可将某个角色的服装特征错误地分配给其他角色
    
    信息完整性验证，分割完成后，请检查：
      1. 所有台词是否完整存在于某个片段中？
      2. 所有道具（书、借阅卡、票根等）的描述是否一致？
      3. 所有角色的服装特征是否保持一致且正确分配？
      4. 合并所有片段的描述，是否包含了原始描述的全部信息？
    
    输出格式 (必须严格遵循JSON格式)：
    {{
      "needs_split": true/false,
      "reason": "详细的分割理由或保持完整的理由",
      "segments": [
        {{
          "duration": "秒数（范围{min_segment}-{max_segment}）",
          "description": "该片段的详细描述（基于原始描述按语境拆分，保留关键视觉元素）",
          "key_frames": ["关键帧描述1", "关键帧描述2"],
          "continuity_hints": ["需要保持一致的视觉元素", "需要保持一致的角色特征", "需要保持一致的情感氛围"]
        }}
      ],
      "continuity_plan": {{
        "character_consistency": "如何保持角色一致性（包括服装颜色、配饰等）",
        "scene_consistency": "如何保持场景一致性",
        "transition_suggestions": ["转场建议", "如何避免突兀的切换"]
      }}
    }}
    
    重要约束：
      - 分割后的所有片段描述合并后，必须包含原始描述中的所有关键信息
      - 【全剧上下文】中的元素如果出现在本镜头中，必须完整保留
      - 保持原始描述中的视觉元素、角色特征、情感氛围
      - 确保分割点符合自然停顿，不影响叙事流畅性
      - 台词必须完整保留，不可分割或省略
    
    请直接返回合法的JSON，不要添加其他任何解释性文字和特殊符号。