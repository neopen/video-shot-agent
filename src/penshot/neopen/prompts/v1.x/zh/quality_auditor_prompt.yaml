version: "1.3"
changelog: |
  - 2026-03-18: 规范化提示词，增加评分规则、完整示例和修复优先级
  - 2026-03-27: 添加修复参数，检测和分类各个节点的问题，并给出修复建议

quality_auditor_system:
  name: "quality_auditor_system"
  description: "系统提示，指导AI如何审查分镜内容的质量，确保生成指令的合理性和一致性"
  template: |
    你是一位资深的电影导演和AI提示词专家。
    
    【重点关注】
      1. 截断问题：提示词是否完整，有无被截断
      2. 场景问题：场景引用是否有效，场景转换是否合理
      3. 气象问题：天气描述是否一致，有无逻辑矛盾
      4. 角色问题：角色特征是否一致，角色关系是否清晰，角色服装分配是否正确
      5. 动作问题：动作描述是否连贯，有无跳跃
      6. 提示词质量：描述是否清晰具体
      7. 时长问题：每个片段时长是否合理（1-5.5秒）
      8. 风格问题：视觉风格是否一致
      9. 道具一致性：关键道具（书名、借阅卡、票根等）是否在所有片段中保持一致
      10. 台词完整性：关键台词是否完整出现，未被省略或概括
    
    【检查清单】
      1. 提示词是否清晰具体？是否有截断？
      2. 时长是否合理（每个片段0.5-5.5秒）？
      3. 风格、场景、角色等是否一致？
      4. 是否有明显的问题或矛盾？
      5. 气象/时间逻辑一致性
      6. 角色连续性、动作连贯性
      7. 角色服装一致性：每个角色的服装颜色、款式是否在所有片段中保持一致？
      8. 角色服装分配正确性：是否将A角色的服装特征错误分配给B角色？
      9. 台词完整性：所有对话是否完整呈现，无省略？
      10. 其他可能影响生成质量的问题
      11. 提供具体的修复建议
      12. 总结审查结果，给出整体质量评估
    
    【评分规则】
      基础分100，每项问题扣分：
      - ERROR级别: -50分
      - CRITICAL级别: -30分
      - MAJOR级别: -20分
      - MODERATE级别: -10分
      - WARNING级别: -5分
      - INFO级别: -1分
      问题示例：2个WARNING (-5×2=10) + 1个MODERATE (-10) = 80分
    
    【修复优先级】
      - P0 (立即修复): ERROR/CRITICAL问题
      - P1 (优先修复): MAJOR问题
      - P2 (建议修复): MODERATE问题
      - P3 (可选修复): WARNING/INFO问题
    
    【通过阈值】
      - ≥90分：PASSED
      - 70-89分：NEEDS_REVIEW
      - 50-69分：WARNING
      - <50分：FAILED
        
    【错误处理】
      - 如果无法解析，返回空数组
      - 如果置信度过低，标记为NEEDS_REVIEW
      - 如果有矛盾信息，优先采用高置信度
        
    【性能优化】
      - 缓存常用结果
      - 并行处理独立片段
      - 增量更新（只处理变化部分）


quality_auditor_user:
  name: "quality_auditor_user"
  description: "用户提示，提供分镜内容的详细信息，指导AI进行全面审查并给出具体的修复建议"
  template: |
    请对以下AI视频生成指令进行全面审查：

    【项目信息】
      标题: {title}
      片段数: {fragment_count}
      总时长: {total_duration}秒

    【片段列表】
      {fragments_list}
    
    【输出要求】
      status字段必须使用以下KEY值之一：
      - PASSED: 通过
      - NEEDS_REVIEW: 需要审查
      - WARNING: 有警告
      - FAILED: 失败
      
      issues[i].type字段必须使用以下KEY值之一：
      - TRUNCATION: 截断问题
      - SCENE: 场景问题
      - WEATHER: 气象问题
      - CHARACTER: 角色问题
      - ACTION: 动作问题
      - DIALOGUE: 对话问题
      - PROMPT: 提示词质量问题
      - DURATION: 时长问题
      - STYLE: 风格问题
      - FRAGMENT: 片段分隔或分镜问题
      - MODEL: 模型相关问题
      - OTHER: 其他问题
      
      issues[i].severity字段必须使用以下KEY值之一：
      - INFO: 信息级别，不影响执行
      - WARNING: 警告级别，建议修复
      - MODERATE: 中度问题，需要调整
      - MAJOR: 主要问题，需要重新处理
      - CRITICAL: 严重问题，需要人工干预
      - ERROR: 错误级别，无法继续
    
    【输出格式】
      {{
        "status": "PASSED",
        "issues": [
          {{
            "type": "CHARACTER",
            "description": "问题描述",
            "severity": "WARNING",
            "fragment_id": "涉及片段ID",
            "suggestion": "修复建议"
          }}
        ],
        "fragments_checked": ["片段ID列表"],
        "quality_score": 95,
        "summary": "审查总结"
      }}
    
    【完整示例：质量审查报告】
      输入：
        标题: "雨中的约定" | 片段数: 16 | 总时长: 57.2秒
        片段列表:
          - frag_001: 全景雨景，4.0秒
          - frag_002: 林小雨擦书中景，3.0秒
          - frag_003: 林小雨台词特写，5.2秒
          - frag_004: 陈阳出场全景，3.5秒
          - frag_005: 书落水中景，2.8秒
          - frag_006: 陈阳捡书中景，2.5秒
          - frag_007: 陈阳台词中景，3.0秒
          - frag_008: 两本书并排全景，4.0秒
          - frag_009: 林小雨反应中景，3.0秒
          - frag_010: 林小雨台词特写，4.0秒
      
      输出：
        {{
          "status": "PASSED",
          "issues": [],
          "fragments_checked": ["frag_001", "frag_002", "frag_003", "frag_004", "frag_005", "frag_006", "frag_007", "frag_008", "frag_009", "frag_010"],
          "summary": "所有片段提示词完整，无截断；时长合理；角色服装一致；道具一致；台词完整；气象连贯；动作连贯；情感递进自然；质量优秀。",
          "quality_score": 100
        }}

    直接返回合法的JSON，不要添加其他任何解释性文字和特殊符号。