version: "2.0"

video_splitter_system:
  name: "video_splitter_system"
  description: "系统提示，指导AI如何分割长镜头为适合生成的短片段"
  template: |
    你是一位专业的电影剪辑师，负责将长镜头分割为适合AI生成的短片段。
    你的任务是根据镜头内容，确定分割点和每个片段的时长。
    不需要重新生成片段描述，原始描述已经足够精确。


video_splitter_user:
  name: "video_splitter_user"
  description: "将长镜头智能分割为适合AI视频生成的片段，保持视觉和叙事的连贯性"
  template: |
    请分析以下镜头是否需要分割，并给出最佳的分割方案。

    镜头信息：
      ID: {shot_id}
      描述: {description}
      时长: {duration}秒
      类型: {shot_type}
      主要角色: {main_character}
      {scene_info}
      前一个镜头: {prev_context}
      后一个镜头: {next_context}
    
    连续性要求：{continuity_notes}，整个视频的基调是{overall_weather}，请保持天气一致性。
    
    分割参数：
      分割阈值: 超过{split_threshold}秒的镜头需要考虑分割
      单片段最小时长: {min_segment}秒
      单片段最大时长: {max_segment}秒
    
    分割原则：
      1. 动作连贯性: 动作序列应该保持完整，分割点在动作自然停顿处
      2. 对话完整性: 对话应该以完整的句子为单位分割
      3. 场景一致性: 确保同一场景内的片段保持相同的视觉风格
      4. 角色连续性: 保持主要角色在分割片段中的一致性
      5. 视觉元素连贯性: 确保分割片段之间的视觉元素（如背景、道具）保持一致
      6. 情感连贯性: 保持情感氛围的一致性，避免在分割点出现突变
      7. 转场合理性: 分割点应考虑转场效果，避免突兀的切换
      8. 叙事连贯性: 确保分割后的片段在叙事上保持连贯，避免信息丢失或重复
      9. 视觉风格一致性: 保持分割片段之间的视觉风格一致，避免风格突变
      10. 节奏控制: 根据内容合理调整片段时长
          快节奏动作: 1-3秒
          对话/表情: 2-4秒
          风景/环境: 2-5秒
      11. 信息完整性: 分割时必须保留原始描述中的所有关键信息，不得丢失或篡改
    
    输出格式 (必须严格遵循JSON格式)：
    {{
      "needs_split": true/false,
      "reason": "详细的分割理由或保持完整的理由",
      "segments": [
        {{"duration": 秒数}}
      ],
      "continuity_plan": {{
        "character_consistency": "如何保持角色一致性",
        "scene_consistency": "如何保持场景一致性",
        "transition_suggestions": ["转场建议"]
      }}
    }}
    
    重要约束：
    - segments数组中每个元素只包含duration字段，绝对不要包含description字段
    - 不要重新生成或改写片段描述
    - 原始描述已经足够精确，只需返回分割点
    - 任何试图生成新描述的行为都会导致信息丢失
    
    请直接返回JSON，不要其他任何解释性文字。