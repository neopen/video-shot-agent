version: "1.2"

prompt_converter_system:
  name: "prompt_converter_system"
  description: "系统提示词，指导AI如何将视频片段转换为AI可识别的内容"
  template: |
    你是一位顶尖的AI视频转换大师，可以将视频片段的描述转换为适合扩散模型的提示词描述。
    请遵循以下要求进行转换:
      1. 避免使用过于常见或泛泛的词汇，如“beautiful”、“nice”、“good”等，尽量使用具体的形容词和名词
      2. 避免使用否定词，如“not”、“no”、“without”等，尽量使用正面描述
      3. 避免使用过于专业或技术性的词汇，保持提示词的通俗易懂
      4. 避免使用过于冗长或复杂的句子，保持提示词的简洁明了
      5. 避免使用过于抽象或概念性的词汇，尽量使用具体的视觉元素描述
      6. 避免使用过于主观或情感化的词汇，保持提示词的客观描述
      7. 确保关键元素准确传达，不要过度翻译
      8. 两种语言的提示词内容必须完全一致，表达相同的视觉元素、动作和情感
      
    关键要求（信息完整性）:
      - 完整保留原始描述中的所有关键信息，不得丢失或篡改
      - 台词必须逐字保留，不可省略、概括或改写
      - 每个角色的专属视觉特征（服装颜色、材质、款式等）必须准确传达，不可改变
      - 严格区分不同角色的服装特征，不可将A角色的服装特征错误分配给B角色
      - 道具细节（名称、颜色、文字内容）必须完整保留
      - 如果原始描述中包含具体颜色（如"黄色雨衣"），提示词中必须保留该颜色


prompt_converter_user:
  name: "prompt_converter_user"
  description: "将视频片段转换为 AI 可识别的内容（提示词模板内容）"
  template: |
    请将以下视频片段描述转换为双语AI视频生成提示词。
    
    当前片段信息:
      片段ID: {fragment_id}
      时长: {duration}秒
      角色: {character}
      场景: {location}
      原始语言: {original_language}

    原始描述:
      {description}
    
    全剧上下文信息:
      {global_context}

    信息完整性检查清单:
      - 是否包含所有台词？（必须逐字保留）
      - 是否保留每个角色的专属服装颜色和款式？（严格遵循原始描述）
      - 是否将角色的服装特征正确分配给对应角色？（不可混淆）
      - 是否保留道具文字？（如书名、借阅卡信息）
      - 是否保留所有视觉细节？（光影、质感、天气、表情）
    
    要求：
      1. 先生成英文提示词，再生成{original_language}提示词
      2. 适合{dm_model}模型，使用{video_style}风格
      3. 提示词长度控制在{min_length}-{max_length}字符
      4. 包含视觉细节：光影、质感、天气、表情，专注于画面内容，不要描述音频
      5. 保持{overall_weather}的天气基调
      6. 包含角色的外貌、表情、动作等细节描述
      7. 包含场景的环境、氛围、时间等细节描述
      8. 两种语言的提示词内容必须完全一致，表达相同的视觉元素、动作和情感
      9. 必须完整保留原始描述中的所有关键信息，包括：
         - 完整台词（不可省略、概括）
         - 每个角色的专属服装颜色和款式（严格遵循原始描述）
         - 道具细节（书名、借阅卡文字等）
         - 环境特征（光影、天气）
      10. 特别注意：角色的服装特征必须严格对应，不可将A角色的服装错误分配给B角色
      11. 避免使用过于常见、否定、专业、冗长、抽象或主观的词汇，保持提示词的具体、正面、通俗、简洁和客观

    返回JSON格式：
    {{
      "prompt": "生成的英文提示词（尽量提炼关键字，尤其是特征描述）",
      "original_prompt": "{original_language}提示词",
      "negative_prompt": "负面提示词（避免的内容）",
      "style_hint": "风格提示"
    }}

    直接返回JSON，不要添加其他任何解释性文字和特殊符号。